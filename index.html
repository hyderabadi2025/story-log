<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Story Log</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #0d0d14;
      color: #e8e6f0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container { max-width: 750px; margin: 0 auto; }

    h1 {
      font-size: 2.5rem;
      color: #fff;
      margin-bottom: 6px;
      letter-spacing: -1px;
    }

    .subtitle {
      color: #7070a0;
      font-size: 0.95rem;
      margin-bottom: 36px;
      font-family: sans-serif;
    }

    .card {
      background: #13131e;
      border: 1px solid #252535;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #7070a0;
      font-family: sans-serif;
      margin-bottom: 7px;
      margin-top: 16px;
    }

    label:first-child { margin-top: 0; }

    input {
      width: 100%;
      background: #0d0d14;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      padding: 11px 13px;
      color: #e8e6f0;
      font-size: 0.95rem;
      font-family: sans-serif;
      transition: border-color 0.2s;
    }

    input:focus { outline: none; border-color: #e8b84b; }

    button {
      margin-top: 20px;
      background: #e8b84b;
      color: #0d0d14;
      border: none;
      border-radius: 8px;
      padding: 11px 26px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover:not(:disabled) { background: #f5cc6a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error { margin-top: 10px; color: #e05c5c; font-size: 0.85rem; font-family: sans-serif; }

    .count {
      font-family: sans-serif;
      font-size: 0.75rem;
      color: #555570;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-radius: 8px;
      border: 1px solid #1e1e2e;
      margin-bottom: 8px;
      background: #0f0f1a;
      transition: background 0.15s;
    }

    li:hover { background: #15151f; }

    li a {
      color: #7eb3f5;
      font-size: 1rem;
      text-decoration: none;
    }

    li a:hover { text-decoration: underline; }

    .del {
      background: none;
      border: none;
      color: #444460;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 8px;
      border-radius: 4px;
      margin-top: 0;
      transition: color 0.15s, background 0.15s;
    }

    .del:hover { color: #e05c5c; background: #2a1a1a; }

    .empty {
      text-align: center;
      padding: 48px 20px;
      color: #444460;
      font-family: sans-serif;
      border: 1px dashed #222230;
      border-radius: 10px;
    }

    .empty p:first-child { font-size: 2rem; margin-bottom: 10px; }

    .loading {
      text-align: center;
      padding: 32px;
      color: #555570;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Story Log</h1>
    <p class="subtitle">Add stories you've read. Saved to your database — available on any device.</p>

    <div class="card">
      <label for="name">Story Name</label>
      <input type="text" id="name" placeholder="e.g. The Last Question" />

      <label for="link">Website Link</label>
      <input type="url" id="link" placeholder="https://..." />

      <button id="addBtn" onclick="addStory()">+ Add Story</button>
      <p class="error" id="error"></p>
    </div>

    <div id="count" class="count"></div>
    <ul id="list"><div class="loading">Loading your stories…</div></ul>
  </div>

  <script>
    // ─── PASTE YOUR SUPABASE DETAILS HERE ───────────────────────────
    const SUPABASE_URL  = "https://rdjrwxwuyugmjsuvscsx.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkanJ3eHd1eXVnbWpzdXZzY3N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzAzOTEsImV4cCI6MjA5NjQwNjM5MX0.2xm0WOMaelheQAI1_NGkLdgUTkohiiolwsDxHT1Z-aU";
    // ────────────────────────────────────────────────────────────────

    const BASE = `${SUPABASE_URL}/rest/v1/stories`;
    const HEADERS = {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON,
      "Authorization": `Bearer ${SUPABASE_ANON}`,
    };

    async function loadStories() {
      const res = await fetch(`${BASE}`, { headers: HEADERS });
      const stories = await res.json();
      for (let i = stories.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [stories[i], stories[j]] = [stories[j], stories[i]];
      }
      render(stories);
    }

    async function addStory() {
      const name = document.getElementById("name").value.trim();
      const link = document.getElementById("link").value.trim();
      const error = document.getElementById("error");
      const btn = document.getElementById("addBtn");

      if (!name) { error.textContent = "Please enter a story name."; return; }
      if (!link)  { error.textContent = "Please enter a website link."; return; }
      if (!link.startsWith("http")) { error.textContent = "Link must start with https://"; return; }

      error.textContent = "";
      btn.disabled = true;
      btn.textContent = "Saving…";

      const res = await fetch(BASE, {
        method: "POST",
        headers: { ...HEADERS, "Prefer": "return=representation" },
        body: JSON.stringify({ name, link }),
      });

      btn.disabled = false;
      btn.textContent = "+ Add Story";

      if (res.ok) {
        document.getElementById("name").value = "";
        document.getElementById("link").value = "";
        loadStories();
      } else {
        error.textContent = "Failed to save. Check your Supabase config.";
      }
    }

    async function deleteStory(id, btn) {
      btn.disabled = true;
      btn.textContent = "…";

      const res = await fetch(`${BASE}?id=eq.${id}`, {
        method: "DELETE",
        headers: { ...HEADERS, "Prefer": "return=minimal" },
      });

      if (res.ok) {
        loadStories();
      } else {
        btn.disabled = false;
        btn.textContent = "✕";
        alert("Failed to delete. Check your Supabase RLS policy for DELETE.");
      }
    }

    function render(stories) {
      const list  = document.getElementById("list");
      const count = document.getElementById("count");

      count.textContent = stories.length
        ? `${stories.length} ${stories.length === 1 ? "story" : "stories"}`
        : "";

      if (!stories.length) {
        list.innerHTML = `
          <div class="empty">
            <p>📖</p>
            <p>No stories yet. Add your first one above.</p>
          </div>`;
        return;
      }

      list.innerHTML = stories.map(s => `
        <li>
          <a href="${s.link}" target="_blank" rel="noopener noreferrer">${s.name}</a>
          <button class="del" onclick="deleteStory('${s.id}', this)" title="Remove">✕</button>
        </li>
      `).join("");
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") addStory();
    });

    loadStories();
  </script>
</body>
</html>
