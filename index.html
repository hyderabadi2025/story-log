<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Story Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #0e0e14;
      color: #eeeaff;
      min-height: 100vh;
      padding: 36px 20px 60px;
    }

    .container { max-width: 600px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      padding-bottom: 14px;
      border-bottom: 2px solid #eeeaff;
      margin-bottom: 28px;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.2rem;
      font-weight: 900;
      color: #eeeaff;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .subtitle {
      font-size: 0.72rem;
      color: #3e3e58;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* ── Form card ── */
    .card {
      background: #13131c;
      border: 1px solid #22222f;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: #3e3e58;
      margin-bottom: 6px;
      margin-top: 14px;
    }

    label:first-child { margin-top: 0; }

    input {
      width: 100%;
      background: #0a0a10;
      border: 1px solid #22222f;
      border-radius: 8px;
      padding: 10px 12px;
      color: #eeeaff;
      font-size: 0.95rem;
      font-family: sans-serif;
      transition: border-color 0.2s;
    }

    input::placeholder { color: #2e2e44; }
    input:focus { outline: none; border-color: #8b7fdf; }

    .add-btn {
      margin-top: 16px;
      width: 100%;
      background: #eeeaff;
      color: #0e0e14;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 800;
      font-family: sans-serif;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-btn:hover:not(:disabled) { background: #ffffff; }
    .add-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .error {
      margin-top: 10px;
      color: #e05c7a;
      font-size: 0.82rem;
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #3e3e58;
    }

    #search {
      padding-left: 36px;
      padding-right: 32px;
      background: #13131c;
      border-color: #22222f;
    }

    #search:focus { border-color: #8b7fdf; }

    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #3e3e58;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px;
      line-height: 1;
      display: none;
    }

    .search-clear:hover { color: #eeeaff; }

    /* ── Story list ── */
    ul { list-style: none; }

    li {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 0;
      border-bottom: 1px solid #1a1a26;
    }

    li:last-child { border-bottom: none; }

    .story-info { flex: 1; min-width: 0; }

    .story-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1rem;
      font-weight: 700;
      color: #eeeaff;
      text-decoration: none;
      line-height: 1.4;
      display: block;
      margin-bottom: 5px;
    }

    .story-title:hover { color: #c8c0ff; }

    .story-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .story-author {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 0.82rem;
      color: #8b7fdf;
    }

    .meta-dot { font-size: 0.6rem; color: #3e3e58; }

    .story-site {
      display: inline-block;
      font-size: 0.62rem;
      color: #6868a0;
      background: #16162a;
      border: 1px solid #26263a;
      border-radius: 20px;
      padding: 2px 8px;
      letter-spacing: 0.5px;
      text-transform: lowercase;
    }

    .del {
      flex-shrink: 0;
      background: none;
      border: none;
      color: #2e2e44;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 4px 6px;
      border-radius: 4px;
      margin-top: 2px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .del:hover { color: #e05c7a; background: #1e1018; }

    /* ── Empty & loading states ── */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: #2e2e44;
      border: 1px dashed #1a1a26;
      border-radius: 10px;
    }

    .empty-icon { font-size: 2rem; margin-bottom: 10px; }
    .empty-msg  { font-size: 0.9rem; color: #3e3e58; }

    .loading {
      text-align: center;
      padding: 32px;
      color: #3e3e58;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <h1>My Story Log</h1>
      <p class="subtitle" id="subtitle">Loading your stories…</p>
    </div>

    <div class="card">
      <label for="name">Story Title</label>
      <input type="text" id="name" placeholder="e.g. The Last Question" />

      <label for="author">Author</label>
      <input type="text" id="author" placeholder="e.g. Isaac Asimov" />

      <label for="link">Website Link</label>
      <input type="url" id="link" placeholder="https://..." />

      <button class="add-btn" id="addBtn" onclick="addStory()">+ Add Story</button>
      <p class="error" id="error"></p>
    </div>

    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search" placeholder="Search by title, author or source…" oninput="filterAndRender()" />
      <button class="search-clear" id="clearBtn" onclick="clearSearch()" title="Clear search">✕</button>
    </div>

    <p class="subtitle" id="count" style="margin-bottom:12px;"></p>
    <ul id="list"><div class="loading">Loading your stories…</div></ul>

  </div>

  <script>
    // ─── PASTE YOUR SUPABASE DETAILS HERE ───────────────────────────
        const SUPABASE_URL  = "https://rdjrwxwuyugmjsuvscsx.supabase.co";
        const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkanJ3eHd1eXVnbWpzdXZzY3N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzAzOTEsImV4cCI6MjA5NjQwNjM5MX0.2xm0WOMaelheQAI1_NGkLdgUTkohiiolwsDxHT1Z-aU";
    // ────────────────────────────────────────────────────────────────

    const BASE = `${SUPABASE_URL}/rest/v1/stories`;
    const HEADERS = {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON,
      "Authorization": `Bearer ${SUPABASE_ANON}`,
    };

    let allStories = []; // full list — never filtered, used as the source of truth

    // ── Load from Supabase, shuffle, then display ──────────────────
    async function loadStories() {
      const res = await fetch(`${BASE}`, { headers: HEADERS });
      allStories = await res.json();

      // Fisher-Yates shuffle — randomise on every load
      for (let i = allStories.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allStories[i], allStories[j]] = [allStories[j], allStories[i]];
      }

      filterAndRender(); // apply any active search term after load
    }

    // ── Filter allStories by the search term, then render ─────────
    function filterAndRender() {
      const term     = document.getElementById("search").value.trim().toLowerCase();
      const clearBtn = document.getElementById("clearBtn");

      // Show ✕ button only when there is a search term
      clearBtn.style.display = term ? "block" : "none";

      if (!term) {
        // No search — show everything
        render(allStories, null);
        return;
      }

      const filtered = allStories.filter(s => {
        const domain = getDomain(s.link);
        return (
          (s.name   || "").toLowerCase().includes(term) ||
          (s.author || "").toLowerCase().includes(term) ||
          domain.toLowerCase().includes(term)
        );
      });

      render(filtered, allStories.length); // pass total so subtitle can show "X of Y"
    }

    // ── Clear the search box and show all stories again ───────────
    function clearSearch() {
      document.getElementById("search").value = "";
      filterAndRender();
      document.getElementById("search").focus();
    }

    // ── Add a new story to Supabase ───────────────────────────────
    async function addStory() {
      const name   = document.getElementById("name").value.trim();
      const author = document.getElementById("author").value.trim();
      const link   = document.getElementById("link").value.trim();
      const error  = document.getElementById("error");
      const btn    = document.getElementById("addBtn");

      if (!name)   { error.textContent = "Please enter a story title."; return; }
      if (!author) { error.textContent = "Please enter an author name."; return; }
      if (!link)   { error.textContent = "Please enter a website link."; return; }
      if (!link.startsWith("http")) { error.textContent = "Link must start with https://"; return; }

      error.textContent = "";
      btn.disabled = true;
      btn.textContent = "Saving…";

      const res = await fetch(BASE, {
        method: "POST",
        headers: { ...HEADERS, "Prefer": "return=representation" },
        body: JSON.stringify({ name, author, link }),
      });

      btn.disabled = false;
      btn.textContent = "+ Add Story";

      if (res.ok) {
        document.getElementById("name").value   = "";
        document.getElementById("author").value = "";
        document.getElementById("link").value   = "";
        loadStories();
      } else {
        error.textContent = "Failed to save. Check your Supabase config.";
      }
    }

    // ── Delete with two-tap confirmation ──────────────────────────
    async function deleteStory(id, btn) {
      // First tap — ask for confirmation
      if (btn.dataset.confirm !== "true") {
        btn.dataset.confirm = "true";
        btn.textContent = "Delete?";
        btn.style.color = "#e05c7a";
        // Auto-reset after 3 seconds if user changes their mind
        setTimeout(() => {
          if (btn.dataset.confirm === "true") {
            btn.dataset.confirm = "";
            btn.textContent = "✕";
            btn.style.color = "";
          }
        }, 3000);
        return;
      }

      // Second tap — confirmed, proceed
      btn.dataset.confirm = "";
      btn.disabled = true;
      btn.textContent = "…";
      btn.style.color = "";

      const res = await fetch(`${BASE}?id=eq.${id}`, {
        method: "DELETE",
        headers: { ...HEADERS, "Prefer": "return=minimal" },
      });

      if (res.ok) {
        loadStories();
      } else {
        btn.disabled = false;
        btn.textContent = "✕";
        btn.style.color = "";
        alert("Failed to delete. Check your Supabase RLS policy for DELETE.");
      }
    }

    // ── Extract domain from a URL ─────────────────────────────────
    function getDomain(url) {
      try { return new URL(url).hostname.replace(/^www\./, ""); }
      catch { return ""; }
    }

    // ── Render the story list ─────────────────────────────────────
    // stories  = array to display (may be filtered)
    // total    = full count before filtering (null means no filter active)
    function render(stories, total) {
      const list = document.getElementById("list");
      const sub  = document.getElementById("subtitle");
      const cnt  = document.getElementById("count");

      const n = stories.length;

      // Update header subtitle
      sub.textContent = total !== null
        ? `${allStories.length} ${allStories.length === 1 ? "story" : "stories"} · shuffled on load`
        : `${n} ${n === 1 ? "story" : "stories"} · shuffled on load`;

      // Update count line below search box
      if (total !== null) {
        // Search is active — show "X of Y results"
        cnt.textContent = n
          ? `${n} of ${total} ${total === 1 ? "story" : "stories"}`
          : `No results for that search`;
      } else {
        cnt.textContent = "";
      }

      if (!n) {
        const msg = total !== null
          ? "No stories match your search."
          : "No stories yet. Add your first one above.";
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📖</div>
            <div class="empty-msg">${msg}</div>
          </div>`;
        return;
      }

      list.innerHTML = stories.map(s => {
        const domain = getDomain(s.link);
        return `
        <li>
          <div class="story-info">
            <a class="story-title" href="${s.link}" target="_blank" rel="noopener noreferrer">${s.name}</a>
            <div class="story-meta">
              <span class="story-author">${s.author || ""}</span>
              ${s.author && domain ? `<span class="meta-dot">·</span>` : ""}
              ${domain ? `<span class="story-site">${domain}</span>` : ""}
            </div>
          </div>
          <button class="del" onclick="deleteStory('${s.id}', this)" title="Remove">✕</button>
        </li>`;
      }).join("");
    }

    // Enter key triggers addStory only when focus is NOT on the search box
    document.addEventListener("keydown", e => {
      if (e.key === "Enter" && document.activeElement.id !== "search") addStory();
    });

    loadStories();
  </script>
</body>
</html>
